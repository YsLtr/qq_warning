name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: qq_warning
            asset_name: qq_warning-linux-amd64
          - os: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu
            artifact_name: qq_warning
            asset_name: qq_warning-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: qq_warning
            asset_name: qq_warning-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: qq_warning
            asset_name: qq_warning-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: qq_warning.exe
            asset_name: qq_warning-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary and config
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}
          cp config.toml release/config.toml
          cp README.md release/README.md

      - name: Create tarball (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: release
        run: |
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }} config.toml README.md

      - name: Create zip (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: release
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ matrix.asset_name }},config.toml,README.md -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            release/*.tar.gz
            release/*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
